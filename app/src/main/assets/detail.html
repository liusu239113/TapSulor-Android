<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收入详情 - TapTapGain</title>
  <link rel="icon" href="app-icon.png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/pixelforge.css">
  <link rel="stylesheet" href="css/pixelforge-detail.css">
</head>
<body>
  <div class="app">
    <!-- 返回栏 -->
    <header class="detail-header">
      <button class="back-btn" id="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        返回
      </button>
      <div class="detail-game-info">
        <div class="detail-game-icon" id="detail-game-icon">?</div>
        <div>
          <div class="detail-game-name" id="detail-game-name">游戏名</div>
          <div class="detail-game-id" id="detail-game-id">-</div>
        </div>
      </div>
      <div class="detail-grand-mini" id="detail-grand-mini" title="累计收入">
        <span>累计收入</span>
        <strong id="grand-total">¥—</strong>
      </div>
    </header>

    <!-- 游戏概览（固定，不随月份变） -->
    <div class="overview-card">
      <div class="overview-metric">
        <div class="overview-value" id="ov-yesterday-rev">¥—</div>
        <div class="overview-label">昨日收入 <span class="mom-tag" id="mom-ov-rev"></span></div>
      </div>
      <div class="overview-divider"></div>
      <div class="overview-metric">
        <div class="overview-value" id="ov-yesterday-dau">—</div>
        <div class="overview-label">昨日日活 <span class="mom-tag" id="mom-ov-dau"></span></div>
        <div class="overview-sub" id="ov-conversion">转化率 —</div>
      </div>
      <div class="overview-divider"></div>
      <div class="overview-metric">
        <div class="overview-value" id="ov-month-rev">¥—</div>
        <div class="overview-label">本月收入 <span class="mom-tag" id="mom-ov-month"></span></div>
      </div>
    </div>

    <!-- 月份选择器 -->
    <div class="month-toolbar">
      <button class="month-nav" id="prev-month" title="上个月">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="month-title" id="month-title" title="点击选择月份">
        <svg class="month-title-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span id="month-title-text">2026年7月</span>
      </button>
      <button class="month-nav" id="next-month" title="下个月">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- 月份选择面板 -->
      <div class="month-picker" id="month-picker" hidden>
        <div class="mp-year-bar">
          <button class="mp-year-nav" id="mp-prev-year" title="上一年">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="mp-year-label" id="mp-year-label">2026</span>
          <button class="mp-year-nav" id="mp-next-year" title="下一年">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="mp-month-grid" id="mp-month-grid"></div>
      </div>
    </div>

    <!-- 月汇总内联条 + 导出 -->
    <div class="cal-toolbar">
      <div class="ms-inline">
        <span class="ms-item"><b id="ms-total">¥0.00</b><i>月总收入</i></span>
        <span class="ms-sep">·</span>
        <span class="ms-item"><b id="ms-dau">0</b><i>月总日活</i></span>
        <span class="ms-sep">·</span>
        <span class="ms-item"><b id="ms-conv">0%</b><i>均转化</i></span>
      </div>
      <button class="export-btn" id="export-btn" title="导出 CSV">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        导出
      </button>
    </div>

    <!-- 日历表头 -->
    <div class="cal-header">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div class="daily-grid" id="daily-grid">
      <div class="loading-tip">加载中...</div>
    </div>
  </div>

  <script src="android-bridge.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>

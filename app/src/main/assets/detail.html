<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#25B6E9">
  <title>TapSulor 收益详情</title>
  <link rel="icon" href="app-icon.png">
  <script>
    // 启动前立即恢复主题，避免错色闪烁（与主界面读取同一 localStorage 键）
    (function(){
      try{
        var mode = localStorage.getItem('taptap_theme_mode') || 'light';
        var a = localStorage.getItem('taptap_theme_accent') || 'cyan';
        document.documentElement.setAttribute('data-theme', mode);
        document.documentElement.setAttribute('data-accent', a);
        var meta = document.querySelector('meta[name="theme-color"]');
        if(meta){
          var map = {cyan:'#25B6E9',pink:'#FF7FB3',purple:'#8B7CF6',mint:'#36C9A0'};
          meta.setAttribute('content', mode === 'dark' ? '#141820' : (map[a] || '#25B6E9'));
        }
      }catch(_){}
    })();
  </script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/pixelforge.css">
  <link rel="stylesheet" href="css/pixelforge-detail.css">
</head>
<body>
  <div class="app">
    <!-- 顶部指令栏 -->
    <header class="detail-command">
      <div class="detail-command-left">
        <button class="icon-btn back-btn" id="back-btn" title="返回">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="brand-chip detail-brand">
          <div class="brand-chip-logo detail-game-icon" id="detail-game-icon">?</div>
          <div class="brand-chip-copy">
            <div class="brand-chip-name" id="detail-game-name">游戏名</div>
            <div class="brand-chip-sub detail-game-id" id="detail-game-id">—</div>
          </div>
        </div>
      </div>
      <div class="detail-grand-tile" id="detail-grand-mini" title="累计广告收益">
        <div class="stat-tile-tag">累计收益</div>
        <strong id="grand-total">¥—</strong>
      </div>
      <button class="backend-btn" id="backend-btn" title="打开开发者后台">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span>开发者后台</span>
      </button>
    </header>

    <!-- 游戏概览（overview-card 类名保留作为 JS 插入锚点） -->
    <div class="overview-card stat-deck">
      <div class="stat-tile stat-tile-yesterday">
        <div class="stat-tile-head">
          <span class="stat-tile-tag">昨日 · 广告收益</span>
          <span class="mom-tag" id="mom-ov-rev"></span>
        </div>
        <div class="stat-tile-value" id="ov-yesterday-rev">¥—</div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile-head">
          <span class="stat-tile-tag">昨日 · 日活</span>
          <span class="mom-tag" id="mom-ov-dau"></span>
        </div>
        <div class="stat-tile-value" id="ov-yesterday-dau">—</div>
        <div class="stat-tile-meta" id="ov-conversion">转化率 —</div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile-head">
          <span class="stat-tile-tag">昨日 · 曝光</span>
          <span class="mom-tag" id="mom-ov-imp"></span>
        </div>
        <div class="stat-tile-value" id="ov-yesterday-imp">—</div>
        <div class="stat-tile-meta" id="ov-click-rate">点击率 —</div>
      </div>
      <div class="stat-tile stat-tile-month">
        <div class="stat-tile-head">
          <span class="stat-tile-tag">本月 · 广告收益</span>
          <span class="mom-tag" id="mom-ov-month"></span>
        </div>
        <div class="stat-tile-value" id="ov-month-rev">¥—</div>
        <div class="stat-tile-meta" id="ov-month-meta">
          <span class="meta-row" id="ov-month-avg">日均 ¥—</span>
          <span class="meta-row" id="ov-month-proj">月末预估 ¥—</span>
        </div>
      </div>
    </div>

    <!-- 日历区段头 + 月份导航 -->
    <div class="deck-header cal-deck-header">
      <div class="deck-title">
        <span class="deck-index">03</span>
        每日日历
        <span class="deck-sub">每日收益</span>
      </div>
      <div class="cal-nav-cluster" id="month-nav-cluster">
        <button class="icon-btn month-nav" id="prev-month" title="上个月">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="cal-month-pill" id="month-title" title="点击选择月份">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span id="month-title-text">2026年7月</span>
        </button>
        <button class="icon-btn month-nav" id="next-month" title="下个月">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <!-- 月份选择面板 -->
      <div class="month-picker" id="month-picker" hidden>
        <div class="mp-year-bar">
          <button class="mp-year-nav" id="mp-prev-year" title="上一年">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="mp-year-label" id="mp-year-label">2026</span>
          <button class="mp-year-nav" id="mp-next-year" title="下一年">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="mp-month-grid" id="mp-month-grid"></div>
      </div>
    </div>

    <!-- 月汇总内联条 -->
    <div class="cal-toolbar">
      <div class="ms-inline">
        <span class="ms-item"><b id="ms-total">¥0.00</b><i>月总收入</i></span>
        <span class="ms-sep">·</span>
        <span class="ms-item"><b id="ms-dau">0</b><i>月总日活</i></span>
        <span class="ms-sep">·</span>
        <span class="ms-item"><b id="ms-conv">0%</b><i>均转化</i></span>
      </div>
    </div>

    <!-- 日历表头（cal-header 类名保留作为 JS 插入锚点） -->
    <div class="cal-header">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div class="daily-grid" id="daily-grid">
      <div class="loading-tip">加载中...</div>
    </div>
  </div>

  <script src="android-bridge.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>
